name: Package TAU2-bench for Ascend NPU

on:
  workflow_dispatch:

jobs:
  build-npu-package:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout TAU2-bench
        uses: actions/checkout@v4
        with:
          repository: sierra-research/tau2-bench
          path: tau2-bench-src
          ref: main
          fetch-depth: 0

      - name: Inspect Data Files
        run: |
          echo ">>> Checking for data files..."
          find tau2-bench-src -type f \( -name "*.json" -o -name "*.jsonl" \) | head -n 20
          du -sh tau2-bench-src/*/ 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'arm64'

      - name: Download Dependencies
        run: |
          mkdir -p wheels
          PACKAGES="accelerate datasets pyarrow colorama ruamel.yaml jsonlines evaluate rouge_score bert_score protobuf"
          echo "Downloading: $PACKAGES"
          pip download $PACKAGES \
            --platform manylinux_2_17_aarch64 \
            --python-version 3.10 \
            --only-binary=:all: \
            -d wheels

      - name: Create Offline Package
        run: |
          mkdir -p npu-offline-package
          
          # Copy source and wheels
          cp -r tau2-bench-src npu-offline-package/tau2-bench
          cp -r wheels npu-offline-package/
          
          # Create install.sh using echo to avoid heredoc indentation issues
          echo '#!/bin/bash' > npu-offline-package/install.sh
          echo 'set -e' >> npu-offline-package/install.sh
          echo 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> npu-offline-package/install.sh
          echo 'echo "Installing dependencies..."' >> npu-offline-package/install.sh
          echo 'pip install --no-index --find-links="$SCRIPT_DIR/wheels" accelerate datasets pyarrow colorama ruamel.yaml jsonlines evaluate rouge_score bert_score protobuf' >> npu-offline-package/install.sh
          echo 'cd "$SCRIPT_DIR/tau2-bench"' >> npu-offline-package/install.sh
          echo 'pip install -e . --no-deps' >> npu-offline-package/install.sh
          echo 'echo "Installation complete!"' >> npu-offline-package/install.sh
          chmod +x npu-offline-package/install.sh
          
          # Create run_test.sh
          echo '#!/bin/bash' > npu-offline-package/run_test.sh
          echo 'export ASCEND_RT_VISIBLE_DEVICES=0' >> npu-offline-package/run_test.sh
          echo 'MODEL_PATH="/path/to/your/model"' >> npu-offline-package/run_test.sh
          echo 'TASK="airline"' >> npu-offline-package/run_test.sh
          echo 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> npu-offline-package/run_test.sh
          echo 'cd "$SCRIPT_DIR/tau2-bench"' >> npu-offline-package/run_test.sh
          echo 'python -m tau2_bench.run --model_path "$MODEL_PATH" --device "npu" --task "$TASK"' >> npu-offline-package/run_test.sh
          chmod +x npu-offline-package/run_test.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tau2-bench-npu-offline
          path: npu-offline-package/
          retention-days: 7
