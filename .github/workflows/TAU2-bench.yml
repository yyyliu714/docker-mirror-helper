name: Package TAU2-bench for Ascend NPU (Safe Version)

on:
  workflow_dispatch:

jobs:
  build-npu-package:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout TAU2-bench
        uses: actions/checkout@v4
        with:
          repository: sierra-research/tau2-bench
          path: tau2-bench-src
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'arm64'

      - name: Download Dependencies
        run: |
          mkdir -p wheels
          PACKAGES="accelerate datasets pyarrow colorama ruamel.yaml jsonlines evaluate rouge_score bert_score protobuf"
          echo "Downloading: $PACKAGES"
          pip download $PACKAGES \
            --platform manylinux_2_17_aarch64 \
            --python-version 3.10 \
            --only-binary=:all: \
            -d wheels || echo "Some packages may need source build, continuing..."

      - name: Create Offline Package Structure
        run: |
          mkdir -p npu-offline-package
          cp -r tau2-bench-src npu-offline-package/tau2-bench
          cp -r wheels npu-offline-package/

      - name: Generate Install Script
        run: |
          cd npu-offline-package
          echo '#!/bin/bash' > install.sh
          echo 'set -e' >> install.sh
          echo 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> install.sh
          echo 'echo "=== Starting Installation ==="' >> install.sh
          echo 'echo "Installing dependencies from local wheels..."' >> install.sh
          echo 'pip install --no-index --find-links="$SCRIPT_DIR/wheels" accelerate datasets pyarrow colorama ruamel.yaml jsonlines evaluate rouge_score bert_score protobuf' >> install.sh
          echo 'echo "Installing tau2-bench..."' >> install.sh
          echo 'cd "$SCRIPT_DIR/tau2-bench"' >> install.sh
          echo 'pip install -e . --no-deps' >> install.sh
          echo 'echo "=== Installation Complete ==="' >> install.sh
          echo 'echo "NOTE: Please ensure torch and torch_npu are installed on this machine separately."' >> install.sh
          chmod +x install.sh

      - name: Generate Run Script
        run: |
          cd npu-offline-package
          echo '#!/bin/bash' > run_test.sh
          echo 'export ASCEND_RT_VISIBLE_DEVICES=0' >> run_test.sh
          echo 'MODEL_PATH="/path/to/your/model"' >> run_test.sh
          echo 'TASK="airline"' >> run_test.sh
          echo 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> run_test.sh
          echo 'echo "Running test with model: $MODEL_PATH"' >> run_test.sh
          echo 'cd "$SCRIPT_DIR/tau2-bench"' >> run_test.sh
          echo 'python -m tau2_bench.run --model_path "$MODEL_PATH" --device "npu" --task "$TASK"' >> run_test.sh
          chmod +x run_test.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tau2-bench-npu-safe-package
          path: npu-offline-package/
          retention-days: 7
