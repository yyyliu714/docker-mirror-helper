name: Build AISBench Offline Package (Python 3.11)

on:
  workflow_dispatch:
    description: "手动触发：生成离线安装包"

jobs:
  build-offline:
    runs-on: ubuntu-22.04 # 精确匹配目标服务器系统

    steps:
    - name: 🛠️ Checkout AISBench Source Code
      uses: actions/checkout@v4

    - name: 🐍 Set Up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: 📦 Upgrade pip and Prepare Directory
      run: |
        python -m pip install --upgrade pip
        mkdir -p offline_package/wheels

    - name: 📥 Download Core Package (Editable Mode)
      # 下载 AISBench 自身（包含 pyproject.toml 依赖）
      run: |
        pip download -d offline_package/wheels/ --no-deps --use-pep517 ./

    - name: 📥 Download API Dependencies
      run: |
        pip download -d offline_package/wheels/ -r requirements/api.txt

    - name: 📥 Download Extra Dependencies
      run: |
        pip download -d offline_package/wheels/ -r requirements/extra.txt

    - name: 📁 Copy Source Code
      run: |
        cp -r . offline_package/ais_bench_src
        rm -rf offline_package/ais_bench_src/.git

    - name: 🗜️ Create Final ZIP Archive
      run: |
        zip -r ais_bench-offline-python311.zip offline_package/

    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ais_bench-offline_package_py311
        path: ais_bench-offline-python311.zip
        retention-days: 7
