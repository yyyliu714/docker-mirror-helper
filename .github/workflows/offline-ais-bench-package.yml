name: Build AISBench Offline Package

on:
  workflow_dispatch:
    description: '手动触发构建离线包'

jobs:
  build-offline:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Create Directory
        run: |
          mkdir -p offline_package/wheels

      - name: Download Core Package
        run: |
          # 尝试下载当前目录的包，如果失败则跳过（针对非标准结构）
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            pip download -d offline_package/wheels/ --no-deps --use-pep517 .
          else
            echo "No pyproject.toml or setup.py found in root, skipping core download."
          fi

      - name: Download API Dependencies
        run: |
          if [ -f "requirements/api.txt" ]; then
            pip download -d offline_package/wheels/ -r requirements/api.txt
          else
            echo "requirements/api.txt not found"
          fi

      - name: Download Extra Dependencies
        run: |
          if [ -f "requirements/extra.txt" ]; then
            pip download -d offline_package/wheels/ -r requirements/extra.txt
          else
            echo "requirements/extra.txt not found"
          fi

      - name: Copy Source Code
        run: |
          mkdir -p offline_package/ais_bench_src
          cp -r . offline_package/ais_bench_src/
          rm -rf offline_package/ais_bench_src/.git

      - name: Create ZIP Archive
        run: |
          zip -r ais_bench-offline-py311.zip offline_package/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ais_bench-offline-py311
          path: ais_bench-offline-py311.zip
          retention-days: 7
