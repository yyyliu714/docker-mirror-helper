name: Debug AISBench Structure

on:
  workflow_dispatch:
    description: '调试项目结构'

jobs:
  debug:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: List All Files
        run: |
          echo "=== 项目根目录 ==="
          ls -la
          echo ""
          echo "=== 查找所有 requirements 相关文件 ==="
          find . -name "*requirements*" -o -name "*.txt" | grep -v ".git" | head -20
          echo ""
          echo "=== 查找 setup.py 或 pyproject.toml ==="
          find . -name "setup.py" -o -name "pyproject.toml"
          echo ""
          echo "=== 目录结构树（限制深度） ==="
          find . -maxdepth 3 -type d | grep -v ".git" | head -30
