name: Build AISBench Offline Package

on:
  workflow_dispatch:
    description: '手动触发构建离线包'

jobs:
  build-offline:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      # 1. 检查项目结构
      - name: Debug Project Structure
        run: |
          echo "=== 项目根目录内容 ==="
          ls -la
          echo "======================"
          echo "=== 查找 setup.py 或 pyproject.toml ==="
          find . -name "setup.py" -o -name "pyproject.toml" | head -10
          echo "======================"
          echo "=== requirements 目录内容 ==="
          ls -la requirements/ 2>/dev/null || echo "requirements 目录不存在"
          echo "======================"

      # 2. 在 home 目录创建工作空间
      - name: Create Workspace
        run: |
          mkdir -p ~/yangliu_ais_bench/offline_package/wheels
          mkdir -p ~/yangliu_ais_bench/offline_package/source_code

      # 3. 复制所有源码到工作空间
      - name: Copy Source Code
        run: |
          # 使用 rsync 排除临时目录
          sudo apt-get update -qq && sudo apt-get install -y -qq rsync
          rsync -av --exclude='offline_package' --exclude='__pycache__' --exclude='*.pyc' --exclude='.git' ./ ~/yangliu_ais_bench/offline_package/source_code/

      # 4. 下载所有依赖（直接从 requirements 文件下载）
      - name: Download Dependencies
        run: |
          # 确保 wheels 目录存在
          mkdir -p ~/yangliu_ais_bench/offline_package/wheels
          
          # 下载 api.txt 依赖
          if [ -f "requirements/api.txt" ]; then
            echo "正在下载 api.txt 依赖..."
            pip download -d ~/yangliu_ais_bench/offline_package/wheels -r requirements/api.txt || true
          else
            echo "警告: requirements/api.txt 不存在"
          fi
          
          # 下载 extra.txt 依赖
          if [ -f "requirements/extra.txt" ]; then
            echo "正在下载 extra.txt 依赖..."
            pip download -d ~/yangliu_ais_bench/offline_package/wheels -r requirements/extra.txt || true
          else
            echo "警告: requirements/extra.txt 不存在"
          fi

      # 5. 创建离线安装脚本
      - name: Create Offline Install Script
        run: |
          echo '#!/bin/bash' > ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '# AISBench 离线安装脚本' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '# 使用方法: bash install_offline.sh' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'set -e  # 遇到错误立即退出' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "========================================="' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "开始离线安装 AISBench"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "========================================="' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '# 获取脚本所在目录' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'SCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '# 1. 从本地 wheels 目录安装所有依赖' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "步骤 1/2: 安装项目依赖..."' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'if [ -f "${SCRIPT_DIR}/source_code/requirements/api.txt" ]; then' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  pip install --no-index --find-links="${SCRIPT_DIR}/wheels" -r "${SCRIPT_DIR}/source_code/requirements/api.txt"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'fi' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'if [ -f "${SCRIPT_DIR}/source_code/requirements/extra.txt" ]; then' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  pip install --no-index --find-links="${SCRIPT_DIR}/wheels" -r "${SCRIPT_DIR}/source_code/requirements/extra.txt"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'fi' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '# 2. 安装核心项目' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "步骤 2/2: 安装 AISBench 核心包..."' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '# 尝试可编辑安装，如果失败则尝试普通安装' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'cd "${SCRIPT_DIR}/source_code/"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  pip install --no-index --find-links="${SCRIPT_DIR}/wheels" -e ./ || pip install --no-index --find-links="${SCRIPT_DIR}/wheels" ./' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'else' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  echo "警告: 未找到 setup.py 或 pyproject.toml，跳过核心包安装"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'fi' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "========================================="' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "✅ AISBench 安装完成！"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "========================================="' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          
          chmod +x ~/yangliu_ais_bench/offline_package/install_offline.sh

      # 6. 创建快速安装说明
      - name: Create README
        run: |
          cat > ~/yangliu_ais_bench/offline_package/README.md << 'EOF'
          # AISBench 离线安装包

          ## 安装步骤

          1. 解压此文件到目标服务器
          2. 进入 offline_package 目录
          3. 运行安装脚本：
             ```bash
             bash install_offline.sh
