name: Pull, Modify and Release Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Docker Image Name (e.g., quay.io/ascend/vllm-ascend)'
        required: true
        default: 'quay.io/ascend/vllm-ascend'
      image_tag:
        description: 'Image Tag (e.g., v0.18.0rc1)'
        required: true
        default: 'v0.18.0'
      platform:
        description: 'Platform (e.g., linux/arm64, linux/amd64)'
        required: true
        default: 'linux/arm64'
      container_name:
        description: 'Container Name for modification'
        required: true
        default: 'test-yl'

jobs:
  modify-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 1: 拉取镜像
      - name: Pull Docker Image
        run: |
          FULL_IMAGE_NAME="${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "Pulling $FULL_IMAGE_NAME for ${{ inputs.platform }}..."
          docker pull --platform ${{ inputs.platform }} "$FULL_IMAGE_NAME"
          echo "full_image_name=$FULL_IMAGE_NAME" >> $GITHUB_ENV
          echo "image_name=${{ inputs.image_name }}" >> $GITHUB_ENV
          echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_ENV

      # 步骤 2: 创建容器并合入 commits
      - name: Create Container and Apply Commits
        id: modify_container
        run: |
          CONTAINER_NAME="${{ inputs.container_name }}"
          FULL_IMAGE_NAME="${{ env.full_image_name }}"
          
          echo "📦 Creating container: $CONTAINER_NAME from $FULL_IMAGE_NAME"
          docker create --name "$CONTAINER_NAME" "$FULL_IMAGE_NAME"
          
          echo "🔄 Starting container..."
          docker start "$CONTAINER_NAME"
          
          echo "📝 Applying commits to vLLM..."
          
          # 定义需要合入的 commit 列表
          COMMITS=(
            "3e6714f33787f3256b80a8ce76358cdc32cdd486"
            "6f9847b166df8db9efb47c73e96b7da166c54e83"
            "40e995157a3139a3404e3a88cf22d8a7fd97a011"
            "c47371c1af88368c8deebd629c78b6229e0cdcd5"
          )
          
          # 在容器内克隆仓库并应用 commits
          docker exec "$CONTAINER_NAME" bash -c "
            set -e
            echo '🔧 Cloning vllm-ascend repository...'
            cd /tmp
            rm -rf vllm-ascend
            git clone https://github.com/FutureSkyFly/vllm-ascend.git
            cd vllm-ascend
            
            echo '📋 Applying commits...'
            for commit in ${COMMITS[@]}; do
              echo 'Applying commit: ' \$commit
              git fetch origin \$commit
              git cherry-pick \$commit || {
                echo '⚠️ Cherry-pick failed for commit '\$commit', trying merge...'
                git merge --no-commit --no-ff \$commit || true
                git add .
                git commit -m \"Merge commit \$commit\" || true
              }
            done
            
            echo '✅ Commits applied successfully!'
            
            echo '📊 Checking applied commits:'
            git log --oneline -5
            
            # 验证三个 commit 是否都在
            echo '🔍 Verifying commits...'
            for commit in ${COMMITS[@]}; do
              if git log --oneline | grep -q \"\$commit\"; then
                echo '✅ Commit '\$commit' found'
              else
                echo '❌ Commit '\$commit' NOT found'
                exit 1
              fi
            done
            
            echo '✅ All three commits verified!'
            
            # 将修改后的代码复制到 vLLM 安装目录
            echo '📦 Installing updated vLLM...'
            pip uninstall -y vllm || true
            pip install -e . --no-deps
          "
          
          echo "✅ Container modification completed"

      # 步骤 3: 安装额外的 Python 包
      - name: Install Additional Packages
        run: |
          CONTAINER_NAME="${{ inputs.container_name }}"
          
          echo "📦 Installing additional Python packages..."
          docker exec "$CONTAINER_NAME" bash -c "
            set -e
            echo 'Installing memfabric_hybrid...'
            pip install memfabric_hybrid==1.1.1 -i https://pypi.tuna.tsinghua.edu.cn/simple
            
            echo 'Installing memcache_hybrid...'
            pip install memcache_hybrid==1.1.1 -i https://pypi.tuna.tsinghua.edu.cn/simple
            
            echo 'Installing transformers...'
            pip install transformers==5.2.0 -i https://pypi.tuna.tsinghua.edu.cn/simple
            
            echo '✅ All packages installed successfully!'
            
            echo '📊 Installed packages:'
            pip list | grep -E 'memfabric|memcache|transformers'
          "
          
          echo "✅ Package installation completed"

      # 步骤 4: 停止容器并提交为镜像
      - name: Commit Container to Image
        run: |
          CONTAINER_NAME="${{ inputs.container_name }}"
          NEW_IMAGE_TAG="${{ env.image_tag }}-modified"
          NEW_IMAGE_NAME="${{ env.image_name }}:$NEW_IMAGE_TAG"
          
          echo "🛑 Stopping container..."
          docker stop "$CONTAINER_NAME"
          
          echo "💾 Committing container to image: $NEW_IMAGE_NAME"
          docker commit "$CONTAINER_NAME" "$NEW_IMAGE_NAME"
          
          echo "🗑️ Removing container..."
          docker rm "$CONTAINER_NAME"
          
          echo "📊 New image created: $NEW_IMAGE_NAME"
          docker images | grep "${{ env.image_name }}"
          
          echo "new_image_name=$NEW_IMAGE_NAME" >> $GITHUB_ENV
          echo "new_image_tag=$NEW_IMAGE_TAG" >> $GITHUB_ENV

      # 步骤 5: 清理系统空间
      - name: Cleanup System
        run: |
          echo "🧹 Cleaning up system to free up space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker builder prune -af
          echo "✅ Cleanup done. Current space:"
          df -h .

      # 步骤 6: 保存并压缩新镜像
      - name: Save and Compress Image
        id: package_step
        run: |
          NEW_IMAGE_NAME="${{ env.new_image_name }}"
          
          # 创建存储目录
          mkdir -p docker-image
          
          # 生成安全的文件名
          SAFE_NAME=$(echo "$NEW_IMAGE_NAME" | sed 's/[\/:]/_/g')
          TAR_FILE="${SAFE_NAME}.tar"
          GZ_FILE="docker-image/${SAFE_NAME}.tar.gz"
          
          # 保存镜像
          echo "Saving image to $TAR_FILE ..."
          docker save -o "$TAR_FILE" "$NEW_IMAGE_NAME"
          
          # 获取原始大小
          ORIGINAL_SIZE=$(du -h "$TAR_FILE" | cut -f1)
          echo "Original size: $ORIGINAL_SIZE"
          
          # 压缩
          echo "Compressing to $GZ_FILE ..."
          gzip -c "$TAR_FILE" > "$GZ_FILE"
          
          # 获取压缩后大小
          COMPRESSED_SIZE=$(du -b "$GZ_FILE" | cut -f1)
          COMPRESSED_SIZE_MB=$((COMPRESSED_SIZE / 1024 / 1024))
          COMPRESSED_SIZE_GB=$(echo "scale=2; $COMPRESSED_SIZE_MB / 1024" | bc)
          COMPRESSED_SIZE_HUMAN=$(du -h "$GZ_FILE" | cut -f1)
          
          echo "Compressed size: $COMPRESSED_SIZE_HUMAN (${COMPRESSED_SIZE_MB}MB / ${COMPRESSED_SIZE_GB}GB)"
          
          # 删除原始 tar 文件
          rm -f "$TAR_FILE"
          
          # 输出大小信息
          echo "compressed_size_mb=$COMPRESSED_SIZE_MB" >> $GITHUB_OUTPUT
          echo "compressed_size_human=$COMPRESSED_SIZE_HUMAN" >> $GITHUB_OUTPUT
          echo "compressed_size_gb=$COMPRESSED_SIZE_GB" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "gz_file=$GZ_FILE" >> $GITHUB_OUTPUT
          
          # GitHub 限制是 2GB，留点余量用 1900MB
          MAX_SIZE_MB=1900
          
          # 判断是否需要分卷
          if [ $COMPRESSED_SIZE_MB -gt $MAX_SIZE_MB ]; then
            echo "文件过大 (${COMPRESSED_SIZE_MB}MB > ${MAX_SIZE_MB}MB)，需要分卷..."
            
            # 计算需要的分卷数量
            PART_COUNT=$(( ($COMPRESSED_SIZE_MB + $MAX_SIZE_MB - 1) / $MAX_SIZE_MB ))
            echo "将分割成 $PART_COUNT 个文件，每个约 ${MAX_SIZE_MB}MB"
            
            # 分卷成 1900MB 的多个文件
            split -b ${MAX_SIZE_MB}M -d -a 3 "$GZ_FILE" "docker-image/${SAFE_NAME}.tar.gz.part."
            
            # 删除原始 gz 文件
            rm -f "$GZ_FILE"
            
            # 列出分卷文件
            echo "分卷文件列表："
            ls -lh docker-image/${SAFE_NAME}.tar.gz.part.*
            
            # 记录分卷信息
            echo "need_split=true" >> $GITHUB_OUTPUT
            echo "part_count=$PART_COUNT" >> $GITHUB_OUTPUT
            
            # 创建文件列表字符串（用逗号分隔）
            FILE_LIST=""
            for file in docker-image/${SAFE_NAME}.tar.gz.part.*; do
              if [ -f "$file" ]; then
                if [ -z "$FILE_LIST" ]; then
                  FILE_LIST="$file"
                else
                  FILE_LIST="$FILE_LIST, $file"
                fi
              fi
            done
            echo "file_list=$FILE_LIST" >> $GITHUB_OUTPUT
            echo "文件列表: $FILE_LIST"
          else
            echo "文件大小在限制内 (${COMPRESSED_SIZE_MB}MB <= ${MAX_SIZE_MB}MB)，直接使用"
            echo "need_split=false" >> $GITHUB_OUTPUT
            echo "file_list=$GZ_FILE" >> $GITHUB_OUTPUT
          fi
          
          # 列出最终文件
          echo "最终文件列表："
          ls -lh docker-image/

      # 步骤 7: 准备 Release Body
      - name: Prepare Release Body
        id: prepare_body
        run: |
          if [ "${{ steps.package_step.outputs.need_split }}" == "true" ]; then
            # 分卷情况的 Release Body
            cat > release_body.md << EOF
          ## Docker Image Backup (Modified)
          
          ### 镜像信息
          - **Original Image**: \`${{ inputs.image_name }}:${{ inputs.image_tag }}\`
          - **Modified Image**: \`${{ env.new_image_name }}\`
          - **Platform**: \`${{ inputs.platform }}\`
          - **Compressed Size**: ${{ steps.package_step.outputs.compressed_size_human }} (${{ steps.package_step.outputs.compressed_size_gb }}GB)
          
          ### 📝 修改内容
          1. **Applied 3 commits** from FutureSkyFly/vllm-ascend:
             - \`3e6714f33787f3256b80a8ce76358cdc32cdd486\`
             - \`6f9847b166df8db9efb47c73e96b7da166c54e83\`
             - \`40e995157a3139a3404e3a88cf22d8a7fd97a011\`
          2. **Installed additional packages**:
             - memfabric_hybrid==1.1.1
             - memcache_hybrid==1.1.1
             - transformers==5.2.0
          
          ### ⚠️ 文件分卷说明
          由于文件大小 (${{ steps.package_step.outputs.compressed_size_human }}) 超过 GitHub 的 2GB 限制，已分割成 ${{ steps.package_step.outputs.part_count }} 个分卷文件。
          
          ### 📥 下载命令
          \`\`\`bash
          # 下载所有分卷
          for i in \$(seq -f "%03g" 0 $((${{ steps.package_step.outputs.part_count }}-1))); do \\
            wget https://github.com/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.package_step.outputs.safe_name }}.tar.gz.part.\$i; \\
          done
          
          # 合并文件
          cat ${{ steps.package_step.outputs.safe_name }}.tar.gz.part.* > ${{ steps.package_step.outputs.safe_name }}.tar.gz
          
          # 加载镜像
          docker load -i ${{ steps.package_step.outputs.safe_name }}.tar.gz
          \`\`\`
          EOF
          else
            # 单文件情况的 Release Body
            cat > release_body.md << EOF
          ## Docker Image Backup (Modified)
          
          ### 镜像信息
          - **Original Image**: \`${{ inputs.image_name }}:${{ inputs.image_tag }}\`
          - **Modified Image**: \`${{ env.new_image_name }}\`
          - **Platform**: \`${{ inputs.platform }}\`
          - **Compressed Size**: ${{ steps.package_step.outputs.compressed_size_human }} (${{ steps.package_step.outputs.compressed_size_gb }}GB)
          
          ### 📝 修改内容
          1. **Applied 3 commits** from FutureSkyFly/vllm-ascend:
             - \`3e6714f33787f3256b80a8ce76358cdc32cdd486\`
             - \`6f9847b166df8db9efb47c73e96b7da166c54e83\`
             - \`40e995157a3139a3404e3a88cf22d8a7fd97a011\`
          2. **Installed additional packages**:
             - memfabric_hybrid==1.1.1
             - memcache_hybrid==1.1.1
             - transformers==5.2.0
          
          ### 📥 下载命令
          \`\`\`bash
          wget https://github.com/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.package_step.outputs.safe_name }}.tar.gz
          docker load -i ${{ steps.package_step.outputs.safe_name }}.tar.gz
          \`\`\`
          EOF
          fi
          
          echo "body_file=release_body.md" >> $GITHUB_OUTPUT

      # 步骤 8: 尝试上传到 Release
      - name: Upload to GitHub Release
        id: upload_release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package_step.outputs.file_list }}
          tag_name: docker-backup-${{ github.run_number }}
          name: "Modified Docker Image: ${{ inputs.image_name }}:${{ inputs.image_tag }}"
          body_path: release_body.md
          fail_on_unmatched_files: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤 9: 检查上传是否成功
      - name: Check Upload Status
        id: check_upload
        run: |
          if [ "${{ steps.upload_release.outcome }}" == "success" ] && [ "${{ steps.upload_release.outputs.url }}" != "" ]; then
            echo "✅ Release 上传成功！"
            echo "upload_success=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Release 上传失败，将保留文件作为 Artifact"
            echo "upload_success=false" >> $GITHUB_OUTPUT
          fi

      # 步骤 10: 如果上传失败，将文件保存为 Artifact
      - name: Upload Artifacts (Backup)
        if: steps.check_upload.outputs.upload_success == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.package_step.outputs.safe_name }}
          path: docker-image/
          retention-days: 90
          if-no-files-found: error

      # 步骤 11: 显示最终结果和下载方式
      - name: Show Final Information
        run: |
          echo "=================================================="
          echo "✅ 任务完成！"
          echo "=================================================="
          echo "📦 Original Image: ${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "📦 Modified Image: ${{ env.new_image_name }}"
          echo "📊 压缩后大小: ${{ steps.package_step.outputs.compressed_size_human }}"
          echo "=================================================="
          echo "📝 已应用的 commits:"
          echo "  - 3e6714f33787f3256b80a8ce76358cdc32cdd486"
          echo "  - 6f9847b166df8db9efb47c73e96b7da166c54e83"
          echo "  - 40e995157a3139a3404e3a88cf22d8a7fd97a011"
          echo "=================================================="
          echo "📦 已安装的包:"
          echo "  - memfabric_hybrid==1.1.1"
          echo "  - memcache_hybrid==1.1.1"
          echo "  - transformers==5.2.0"
          echo "=================================================="
          
          if [ "${{ steps.check_upload.outputs.upload_success }}" == "true" ]; then
            echo "✅ Release 上传成功！"
            echo ""
            echo "👇 访问 Release 页面："
            echo "https://github.com/${{ github.repository }}/releases/tag/docker-backup-${{ github.run_number }}"
            echo ""
            echo "👇 下载命令："
            if [ "${{ steps.package_step.outputs.need_split }}" == "true" ]; then
              echo "# 下载所有分卷"
              echo "for i in \$(seq -f \"%03g\" 0 $((${{ steps.package_step.outputs.part_count }}-1))); do \\"
              echo "  wget https://github.com/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.package_step.outputs.safe_name }}.tar.gz.part.\$i; \\"
              echo "done"
              echo ""
              echo "# 合并文件"
              echo "cat ${{ steps.package_step.outputs.safe_name }}.tar.gz.part.* > ${{ steps.package_step.outputs.safe_name }}.tar.gz"
            else
              echo "wget https://github.com/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.package_step.outputs.safe_name }}.tar.gz"
            fi
          else
            echo "⚠️ Release 上传失败，文件已保存为 Artifact"
            echo ""
            echo "👇 下载 Artifact 的方法："
            echo "----------------------------------------------"
            echo "方法1：通过 GitHub Web 界面"
            echo "1. 进入 Actions 页面"
            echo "2. 找到这个工作流运行记录"
            echo "3. 在 \"Artifacts\" 部分下载 docker-image-${{ steps.package_step.outputs.safe_name }}"
            echo ""
            echo "方法2：使用 GitHub CLI"
            echo "gh run download ${{ github.run_id }} -n docker-image-${{ steps.package_step.outputs.safe_name }}"
            echo "----------------------------------------------"
          fi
          echo "=================================================="
