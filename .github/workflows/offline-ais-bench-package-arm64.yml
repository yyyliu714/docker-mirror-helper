name: Build AISBench Offline Package (ARM64)

on:
  workflow_dispatch:
    description: '手动触发构建离线包 (ARM64)'

jobs:
  build-offline:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone AISBench Repository
        run: |
          git clone --depth 1 --branch master https://github.com/AISBench/benchmark.git benchmark
          cd benchmark
          ls -la

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Create Workspace
        run: |
          mkdir -p ~/yangliu_ais_bench/offline_package/wheels
          mkdir -p ~/yangliu_ais_bench/offline_package/source_code

      - name: Copy Source Code
        run: |
          rsync -av --exclude='.git' ./benchmark/ ~/yangliu_ais_bench/offline_package/source_code/

      - name: Download ARM64 Dependencies
        run: |
          cd ~/yangliu_ais_bench/offline_package/source_code/
          
          PLATFORM="manylinux2014_aarch64"
          
          echo "=== 下载 ARM64 架构的依赖包 ==="
          
          find . -type f -name "requirements*.txt" | while read req_file; do
            echo "正在下载 $req_file 中的 ARM64 包..."
            pip download -d ~/yangliu_ais_bench/offline_package/wheels \
              -r "$req_file" \
              --platform $PLATFORM \
              --python-version 311 \
              --only-binary=:all: \
              --no-deps || true
          done
          
          pip download -d ~/yangliu_ais_bench/offline_package/wheels . --no-deps || true
          
          echo "=== 下载完成 ==="
          ls -lh ~/yangliu_ais_bench/offline_package/wheels/ | head -20

      - name: Create Offline Install Script
        run: |
          echo '#!/bin/bash' > ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'set -e' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'SCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "========================================="' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "开始离线安装 AISBench (ARM64)"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "========================================="' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'cd "${SCRIPT_DIR}/source_code/"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'PIP_OPTS="--no-index --find-links=${SCRIPT_DIR}/wheels"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'if [ -f "requirements/runtime.txt" ]; then' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  echo "安装 runtime 依赖..."' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  pip install ${PIP_OPTS} -r requirements/runtime.txt' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'fi' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'if [ -f "requirements/api.txt" ]; then' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  echo "安装 api 依赖..."' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  pip install ${PIP_OPTS} -r requirements/api.txt || true' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'fi' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'if [ -f "requirements/extra.txt" ]; then' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  echo "安装 extra 依赖..."' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '  pip install ${PIP_OPTS} -r requirements/extra.txt || true' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'fi' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "安装 AISBench 核心包..."' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'pip install ${PIP_OPTS} -e .' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo '' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "========================================="' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "✅ AISBench 安装完成！"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "运行 '\''ais_bench -h'\'' 验证安装"' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          echo 'echo "========================================="' >> ~/yangliu_ais_bench/offline_package/install_offline.sh
          
          chmod +x ~/yangliu_ais_bench/offline_package/install_offline.sh

      - name: Create README
        run: |
          echo '# AISBench 离线安装包 (ARM64)' > ~/yangliu_ais_bench/offline_package/README.md
          echo '' >> ~/yangliu_ais_bench/offline_package/README.md
          echo '## 环境要求' >> ~/yangliu_ais_bench/offline_package/README.md
          echo '- **架构**: ARM64 (aarch64)' >> ~/yangliu_ais_bench/offline_package/README.md
          echo '- Python 3.10, 3.11 或 3.12' >> ~/yangliu_ais_bench/offline_package/README.md
          echo '' >> ~/yangliu_ais_bench/offline_package/README.md
          echo '## 安装步骤' >> ~/yangliu_ais_bench/offline_package/README.md
          echo '' >> ~/yangliu_ais_bench/offline_package/README.md
          echo '```bash' >> ~/yangliu_ais_bench/offline_package/README.md
          echo 'tar -xzf ais_bench-offline-arm64.tar.gz' >> ~/yangliu_ais_bench/offline_package/README.md
          echo 'cd offline_package' >> ~/yangliu_ais_bench/offline_package/README.md
          echo 'bash install_offline.sh' >> ~/yangliu_ais_bench/offline_package/README.md
          echo '```' >> ~/yangliu_ais_bench/offline_package/README.md

      - name: Create Final Archive
        run: |
          cd ~/yangliu_ais_bench
          tar -czf ${GITHUB_WORKSPACE}/ais_bench-offline-arm64.tar.gz offline_package/
          echo "ARM64 离线包大小:"
          ls -lh ${GITHUB_WORKSPACE}/ais_bench-offline-arm64.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ais_bench-offline-arm64
          path: ais_bench-offline-arm64.tar.gz
          retention-days: 7
