name: Pull, Compress and Release Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Docker Image Name (e.g., quay.io/ascend/vllm-ascend)'
        required: true
        default: 'quay.io/ascend/vllm-ascend'
      image_tag:
        description: 'Image Tag (e.g., v0.17.0rc1-a3-openeuler)'
        required: true
        default: 'v0.17.0rc1-a3-openeuler'
      platform:
        description: 'Platform (e.g., linux/arm64, linux/amd64)'
        required: true
        default: 'linux/arm64'

jobs:
  pull-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 1: 拉取镜像
      - name: Pull Docker Image
        run: |
          FULL_IMAGE_NAME="${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "Pulling $FULL_IMAGE_NAME for ${{ inputs.platform }}..."
          docker pull --platform ${{ inputs.platform }} "$FULL_IMAGE_NAME"
          echo "full_image_name=$FULL_IMAGE_NAME" >> $GITHUB_ENV
          
      # 步骤 2: 清理空间 + 保存 + 压缩
      - name: Save and Compress Image
        id: package_step
        run: |
          # 释放空间
          echo "🧹 Cleaning up system to free up space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker builder prune -af
          docker image prune -af
          echo "✅ Cleanup done. Current space:"
          df -h .

          # 验证镜像是否存在
          FULL_IMAGE_NAME="${{ env.full_image_name }}"
          echo "Verifying image: $FULL_IMAGE_NAME"
          docker image inspect "$FULL_IMAGE_NAME" > /dev/null 2>&1 || {
            echo "❌ Error: Image $FULL_IMAGE_NAME not found locally!"
            docker images
            exit 1
          }

          # 生成文件名（替换特殊字符）
          SAFE_NAME=$(echo "$FULL_IMAGE_NAME" | sed 's/[\/:]/_/g')
          GZ_FILE="${SAFE_NAME}.tar.gz"
          
          # 保存并直接压缩（使用管道，避免中间tar文件）
          echo "Saving and compressing image to $GZ_FILE ..."
          docker save "$FULL_IMAGE_NAME" | gzip > "$GZ_FILE"
          
          echo "✅ Final compressed size:"
          ls -lh "$GZ_FILE"
          
          # 输出变量
          echo "final_file=$GZ_FILE" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      # 步骤 3: 上传到 Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package_step.outputs.final_file }}
          tag_name: docker-backup-${{ github.run_number }}
          name: "Docker Image: ${{ inputs.image_name }}:${{ inputs.image_tag }}"
          body: |
            ## Docker Image Backup
            
            ### 镜像信息
            - **Name**: `${{ inputs.image_name }}`
            - **Tag**: `${{ inputs.image_tag }}`
            - **Platform**: `${{ inputs.platform }}`
            - **Compressed Size**: $(ls -lh ${{ steps.package_step.outputs.final_file }} | awk '{print $5}')
            
            ### 📥 下载链接
            [Download ${{ steps.package_step.outputs.final_file }}](${{ github.server_url }}/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.package_step.outputs.final_file }})
            
            ### 服务器下载命令
            ```bash
            # 直接下载到服务器
            wget https://github.com/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.package_step.outputs.final_file }}
            
            # 如果需要加载到 Docker（可选）
            # docker load -i ${{ steps.package_step.outputs.final_file }}
