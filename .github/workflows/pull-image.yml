name: Pull, Compress and Release Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Docker Image Name (e.g., quay.io/ascend/vllm-ascend)'
        required: true
        default: 'quay.io/ascend/vllm-ascend'
      image_tag:
        description: 'Image Tag (e.g., v0.17.0rc1-a3-openeuler)'
        required: true
        default: 'v0.17.0rc1-a3-openeuler'
      platform:
        description: 'Platform (e.g., linux/arm64, linux/amd64)'
        required: true
        default: 'linux/arm64'

jobs:
  pull-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 1: 拉取镜像
      - name: Pull Docker Image
        run: |
          FULL_IMAGE_NAME="${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "Pulling $FULL_IMAGE_NAME for ${{ inputs.platform }}..."
          docker pull --platform ${{ inputs.platform }} "$FULL_IMAGE_NAME"
          echo "full_image_name=$FULL_IMAGE_NAME" >> $GITHUB_ENV
          
          # 立即保存镜像名到文件，防止后续步骤丢失
          echo "$FULL_IMAGE_NAME" > image_name.txt
          
      # 步骤 2: 先保存镜像，再清理空间
      - name: Save Image Before Cleanup
        id: save_step
        run: |
          FULL_IMAGE_NAME="${{ env.full_image_name }}"
          
          # 生成文件名
          SAFE_NAME=$(echo "$FULL_IMAGE_NAME" | sed 's/[\/:]/_/g')
          TAR_FILE="${SAFE_NAME}.tar"
          
          echo "Saving image to $TAR_FILE before cleanup..."
          docker save -o "$TAR_FILE" "$FULL_IMAGE_NAME"
          
          echo "✅ Image saved. Size:"
          ls -lh "$TAR_FILE"
          
          # 保存文件路径供后续步骤使用
          echo "tar_file=$TAR_FILE" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      # 步骤 3: 清理空间（现在可以安全清理，因为镜像已经保存为文件）
      - name: Cleanup System
        run: |
          echo "🧹 Cleaning up system to free up space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker builder prune -af
          docker image prune -af
          echo "✅ Cleanup done. Current space:"
          df -h .

      # 步骤 4: 压缩已保存的镜像文件
      - name: Compress Image
        id: compress_step
        run: |
          TAR_FILE="${{ steps.save_step.outputs.tar_file }}"
          GZ_FILE="${TAR_FILE}.gz"
          
          echo "Compressing $TAR_FILE to $GZ_FILE ..."
          gzip -c "$TAR_FILE" > "$GZ_FILE"
          
          # 删除原始 tar 文件以节省空间
          rm -f "$TAR_FILE"
          
          echo "✅ Final compressed size:"
          ls -lh "$GZ_FILE"
          
          echo "final_file=$GZ_FILE" >> $GITHUB_OUTPUT

      # 步骤 5: 上传到 Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.compress_step.outputs.final_file }}
          tag_name: docker-backup-${{ github.run_number }}
          name: "Docker Image: ${{ inputs.image_name }}:${{ inputs.image_tag }}"
          body: |
            ## Docker Image Backup
            
            ### 镜像信息
            - **Name**: `${{ inputs.image_name }}`
            - **Tag**: `${{ inputs.image_tag }}`
            - **Platform**: `${{ inputs.platform }}`
            
            ### 📥 下载链接
            [Download ${{ steps.compress_step.outputs.final_file }}](${{ github.server_url }}/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.compress_step.outputs.final_file }})
            
            ### 服务器下载命令
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.compress_step.outputs.final_file }}
