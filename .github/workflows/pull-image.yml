name: Pull, Compress and Release Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Docker Image Name (e.g., quay.io/ascend/vllm-ascend)'
        required: true
        default: 'quay.io/ascend/vllm-ascend'
      image_tag:
        description: 'Image Tag (e.g., v0.17.0rc1-a3-openeuler)'
        required: true
        default: 'v0.17.0rc1-a3-openeuler'
      platform:
        description: 'Platform (e.g., linux/arm64, linux/amd64)'
        required: true
        default: 'linux/arm64'

jobs:
  pull-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 1: 拉取镜像
      - name: Pull Docker Image
        run: |
          FULL_IMAGE_NAME="${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "Pulling $FULL_IMAGE_NAME for ${{ inputs.platform }}..."
          docker pull --platform ${{ inputs.platform }} "$FULL_IMAGE_NAME"
          echo "full_image_name=$FULL_IMAGE_NAME" >> $GITHUB_ENV

      # 步骤 2: 清理空间
      - name: Cleanup System
        run: |
          echo "🧹 Cleaning up system to free up space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker builder prune -af
          echo "✅ Cleanup done. Current space:"
          df -h .

      # 步骤 3: 保存并压缩
      - name: Save and Compress Image
        id: package_step
        run: |
          FULL_IMAGE_NAME="${{ env.full_image_name }}"
          
          # 创建存储目录
          mkdir -p docker-image
          
          # 生成安全的文件名
          SAFE_NAME=$(echo "$FULL_IMAGE_NAME" | sed 's/[\/:]/_/g')
          TAR_FILE="${SAFE_NAME}.tar"
          GZ_FILE="docker-image/${SAFE_NAME}.tar.gz"
          
          # 保存镜像
          echo "Saving image to $TAR_FILE ..."
          docker save -o "$TAR_FILE" "$FULL_IMAGE_NAME"
          
          # 获取原始大小
          ORIGINAL_SIZE=$(du -h "$TAR_FILE" | cut -f1)
          echo "Original size: $ORIGINAL_SIZE"
          
          # 压缩
          echo "Compressing to $GZ_FILE ..."
          gzip -c "$TAR_FILE" > "$GZ_FILE"
          
          # 获取压缩后大小
          COMPRESSED_SIZE=$(du -b "$GZ_FILE" | cut -f1)
          COMPRESSED_SIZE_MB=$((COMPRESSED_SIZE / 1024 / 1024))
          COMPRESSED_SIZE_GB=$(echo "scale=2; $COMPRESSED_SIZE_MB / 1024" | bc)
          COMPRESSED_SIZE_HUMAN=$(du -h "$GZ_FILE" | cut -f1)
          
          echo "Compressed size: $COMPRESSED_SIZE_HUMAN (${COMPRESSED_SIZE_MB}MB / ${COMPRESSED_SIZE_GB}GB)"
          
          # 删除原始 tar 文件
          rm -f "$TAR_FILE"
          
          # 输出大小信息
          echo "compressed_size_mb=$COMPRESSED_SIZE_MB" >> $GITHUB_OUTPUT
          echo "compressed_size_human=$COMPRESSED_SIZE_HUMAN" >> $GITHUB_OUTPUT
          echo "compressed_size_gb=$COMPRESSED_SIZE_GB" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "gz_file=$GZ_FILE" >> $GITHUB_OUTPUT
          
          # GitHub 限制是 2GB，留点余量用 1900MB
          MAX_SIZE_MB=1900
          
          # 判断是否需要分卷
          if [ $COMPRESSED_SIZE_MB -gt $MAX_SIZE_MB ]; then
            echo "文件过大 (${COMPRESSED_SIZE_MB}MB > ${MAX_SIZE_MB}MB)，需要分卷..."
            
            # 计算需要的分卷数量
            PART_COUNT=$(( ($COMPRESSED_SIZE_MB + $MAX_SIZE_MB - 1) / $MAX_SIZE_MB ))
            echo "将分割成 $PART_COUNT 个文件，每个约 ${MAX_SIZE_MB}MB"
            
            # 分卷成 1900MB 的多个文件
            split -b ${MAX_SIZE_MB}M -d -a 3 "$GZ_FILE" "docker-image/${SAFE_NAME}.tar.gz.part."
            
            # 删除原始 gz 文件
            rm -f "$GZ_FILE"
            
            # 列出分卷文件（带完整路径）
            echo "分卷文件列表："
            ls -lh docker-image/${SAFE_NAME}.tar.gz.part.*
            
            # 记录分卷信息 - 使用完整路径
            echo "need_split=true" >> $GITHUB_OUTPUT
            echo "part_count=$PART_COUNT" >> $GITHUB_OUTPUT
            
            # 创建文件列表字符串，用逗号分隔（这是 action-gh-release 需要的格式）
            FILE_LIST=""
            for file in docker-image/${SAFE_NAME}.tar.gz.part.*; do
              if [ -f "$file" ]; then
                if [ -z "$FILE_LIST" ]; then
                  FILE_LIST="$file"
                else
                  FILE_LIST="$FILE_LIST, $file"
                fi
              fi
            done
            echo "file_list=$FILE_LIST" >> $GITHUB_OUTPUT
            echo "文件列表: $FILE_LIST"
          else
            echo "文件大小在限制内 (${COMPRESSED_SIZE_MB}MB <= ${MAX_SIZE_MB}MB)，直接使用"
            echo "need_split=false" >> $GITHUB_OUTPUT
            echo "file_list=$GZ_FILE" >> $GITHUB_OUTPUT
          fi
          
          # 列出最终文件
          echo "最终文件列表："
          ls -lh docker-image/

      # 步骤 4: 准备 Release Body
      - name: Prepare Release Body
        id: prepare_body
        run: |
          if [ "${{ steps.package_step.outputs.need_split }}" == "true" ]; then
            # 分卷情况的 Release Body
            cat > release_body.md << 'EOF'
## Docker Image Backup

### 镜像信息
- **Name**: `${{ inputs.image_name }}`
- **Tag**: `${{ inputs.image_tag }}`
- **Platform**: `${{ inputs.platform }}`
- **Compressed Size**: ${{ steps.package_step.outputs.compressed_size_human }} (${{ steps.package_step.outputs.compressed_size_gb }}GB)

### ⚠️ 文件分卷说明
由于文件大小 (${{ steps.package_step.outputs.compressed_size_human }}) 超过 GitHub 的 2GB 限制，已分割成 ${{ steps.package_step.outputs.part_count }} 个分卷文件。

### 📥 下载命令
```bash
# 下载所有分卷
for i in $(seq -f "%03g" 0 $((${{ steps.package_step.outputs.part_count }}-1))); do \\
  wget https://github.com/${{ github.repository }}/releases/download/docker-backup-${{ github.run_number }}/${{ steps.package_step.outputs.safe_name }}.tar.gz.part.$i; \\
done

# 合并文件
cat ${{ steps.package_step.outputs.safe_name }}.tar.gz.part.* > ${{ steps.package_step.outputs.safe_name }}.tar.gz

# 加载镜像
docker load -i ${{ steps.package_step.outputs.safe_name }}.tar.gz
